spring.application.name=api-gateway
server.port=8080

# Eureka
eureka.client.service-url.defaultZone=http://localhost:8761/eureka

# Gateway discovery (updated keys)
spring.cloud.gateway.server.webflux.discovery.locator.enabled=true
spring.cloud.gateway.server.webflux.discovery.locator.lower-case-service-id=true

# Logging
logging.level.org.springframework.cloud.gateway=DEBUG

# JWT secret
jwt.secret=MySuperSecretKeyForShutterERPProject2026MySuperSecretKey

# Explicit routes (optional, can be discovered automatically via Eureka)
spring.cloud.gateway.server.webflux.routes[0].id=auth-service
spring.cloud.gateway.server.webflux.routes[0].uri=lb://auth-service
spring.cloud.gateway.server.webflux.routes[0].predicates[0]=Path=/auth/**

spring.cloud.gateway.server.webflux.routes[1].id=customer-service
spring.cloud.gateway.server.webflux.routes[1].uri=lb://customer-service
spring.cloud.gateway.server.webflux.routes[1].predicates[0]=Path=/customers/**

spring.cloud.gateway.server.webflux.routes[2].id=inventory-service
spring.cloud.gateway.server.webflux.routes[2].uri=lb://inventory-service
spring.cloud.gateway.server.webflux.routes[2].predicates[0]=Path=/inventory/**

spring.cloud.gateway.server.webflux.routes[3].id=quotation-service
spring.cloud.gateway.server.webflux.routes[3].uri=lb://quotation-service
spring.cloud.gateway.server.webflux.routes[3].predicates[0]=Path=/quotation/**